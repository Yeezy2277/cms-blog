# Build the Editorial Toolkit app and upload the bundle to Contentful Hosting.
#
# Free-tier replacement for the source platform's Cloud Build pipeline: the
# bundle is hosted by Contentful itself (no GCP, no Artifact Registry), and
# GitHub Actions does the build + upload that Cloud Build used to.
#
# Required repository secrets:
#   CONTENTFUL_ORG_ID            organisation id
#   EDITORIAL_TOOLKIT_APP_ID     AppDefinition id (from `npm run create-app`)
#   CONTENTFUL_CMA_TOKEN         CMA token with app-upload permission
name: Deploy Editorial Toolkit

on:
  push:
    branches: [main]
    paths:
      - "apps/editorial-toolkit/**"
      - ".github/workflows/deploy-toolkit.yml"
  workflow_dispatch:

jobs:
  upload:
    name: Build & upload bundle
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/editorial-toolkit
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/editorial-toolkit/package-lock.json

      - run: npm ci

      - run: npm run build

      - name: Upload bundle to Contentful Hosting
        run: npm run upload-ci
        env:
          CONTENTFUL_ORG_ID: ${{ secrets.CONTENTFUL_ORG_ID }}
          EDITORIAL_TOOLKIT_APP_ID: ${{ secrets.EDITORIAL_TOOLKIT_APP_ID }}
          CONTENTFUL_CMA_TOKEN: ${{ secrets.CONTENTFUL_CMA_TOKEN }}
