# Deploy the Rich Text Editor standalone demo to Vercel on every change.
# The same bundle serves the public playground (opened directly) and the real
# Contentful app (loaded in the CMS iframe). Contentful-hosted bundle uploads
# stay a local step (`npm run upload`) — that path needs an OAuth token a CI
# secret can't provide.
#
# Setup: add a VERCEL_TOKEN repo secret (Vercel → Account → Settings → Tokens).
# The org/project ids below are not secret — they identify the linked project.
name: Deploy Rich Text Editor

on:
  push:
    branches: [main]
    paths:
      - "apps/rich-text-editor/**"
      - ".github/workflows/deploy-rich-text-editor.yml"
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy demo to Vercel
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/rich-text-editor
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: team_J6bRosdsPJvAb4Ci7J70WHk7
      VERCEL_PROJECT_ID: prj_cZxZFLmSSin8VLDBwVA7o5AuP7pI
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Vercel CLI
        if: env.VERCEL_TOKEN != ''
        run: npm i --global vercel@latest

      - name: Deploy to production
        if: env.VERCEL_TOKEN != ''
        run: |
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          vercel build --prod --token="$VERCEL_TOKEN"
          vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"

      - name: Skipped (no VERCEL_TOKEN yet)
        if: env.VERCEL_TOKEN == ''
        run: echo "Add a VERCEL_TOKEN secret to enable automatic demo deploys."
